<script>
    const PARENT_PIN = "8888";
    const WORKER_URL = "https://shine-bright-api.roy-lai-venetian.workers.dev";   // ← Make sure this matches your Worker URL

    const tasks = {
        mon_thu: { weights: [20, 30, 20, 15, 15], list: [
            { time: "05:00 - 06:15", text: "準時起床 + 晨間高效溫習" },
            { time: "17:30 - 19:00", text: "<b>第一階段：</b>全力完成作業" },
            { time: "20:15 - 21:00", text: "<b>第二階段：</b>溫習與預習" },
            { time: "21:30 熄燈", text: "放下手機，準時入睡" },
            { time: "常規", text: "<span class='family-task'>對家人保持禮貌與情緒自控</span>" }
        ]},
        tue: { weights: [25, 30, 15, 15, 15], list: [
            { time: "05:00 - 06:15", text: "準時起床 + 晨間高效溫習" },
            { time: "18:00 - 19:00", text: "<b>回家功課：</b>集中精神完成" },
            { time: "20:00 - 20:30", text: "<b>檢查功課及整理書包</b>" },
            { time: "21:30 熄燈", text: "準時入睡" },
            { time: "常規", text: "<span class='family-task'>對家人保持禮貌與情緒自控</span>" }
        ]},
        wed: { weights: [20, 30, 20, 15, 15], list: [
            { time: "05:00 - 06:15", text: "準時起床 + 晨間高效溫習" },
            { time: "17:40 - 19:00", text: "<b>數研班：</b>專注邏輯訓練" },
            { time: "20:00 - 21:00", text: "<b>高效功課：</b>精簡時間完成作業" },
            { time: "21:30 熄燈", text: "準時入睡" },
            { time: "常規", text: "<span class='family-task'>對家人保持禮貌與情緒自控</span>" }
        ]},
        friday: { weights: [20, 25, 25, 15, 15], list: [
            { time: "05:00 - 06:15", text: "晨間高效溫習" },
            { time: "16:30 - 18:00", text: "<span class='red-task'>關鍵：完成至少 1/3 週末功課</span>" },
            { time: "20:15 - 21:00", text: "<span class='red-task'>重點：溫習最少半課書</span>" },
            { time: "22:30 熄燈", text: "週末彈性入睡時間" },
            { time: "常規", text: "<span class='family-task'>對家人保持禮貌與情緒自控</span>" }
        ]},
        saturday: { weights: [20, 20, 20, 20, 20], list: [
            { time: "09:00 - 10:30", text: "<b>日文班</b>" },
            { time: "11:30 - 12:30", text: "<span class='red-task'>核心：清空所有剩餘功課</span>" },
            { time: "14:00 - 15:30", text: "<span class='red-task'>專注：溫習最少半課書 (或補習)</span>" },
            { time: "18:00 - 19:00", text: "<b>羽毛球班</b>" },
            { time: "常規", text: "<span class='family-task'>對家人保持禮貌與情緒自控</span>" }
        ]},
        sunday: { weights: [20, 30, 20, 15, 15], list: [
            { time: "09:00 - 10:00", text: "<b>準時起床 + 早餐</b>" },
            { time: "10:30 - 12:00", text: "<span class='red-task'>專注：溫習最少半課書 (或補習)</span>" },
            { time: "16:30 - 17:30", text: "<b>檢查書包、功課與校服</b>" },
            { time: "21:30 熄燈", text: "準時入睡" },
            { time: "常規", text: "<span class='family-task'>對家人保持禮貌與情緒自控</span>" }
        ]}
    };

    let currentMode = "";
    let isLocked = false;
    let historyData = {};

    const d = new Date();
    const todayStr = d.toISOString().split('T')[0];

    document.getElementById('dateText').innerText = d.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });

    // ==================== CLOUD SYNC FUNCTIONS ====================
    async function loadFromCloud() {
        try {
            const res = await fetch(`${WORKER_URL}/api/load`);
            if (!res.ok) throw new Error("Network error");
            const json = await res.json();
            if (json.success && json.historyData) {
                historyData = json.historyData;
                localStorage.setItem('shineHistory', JSON.stringify(historyData));
                console.log("✅ Loaded from cloud successfully");
                return true;
            }
        } catch (e) {
            console.log("🌐 Cloud load failed, using localStorage");
        }
        // Fallback to localStorage
        historyData = JSON.parse(localStorage.getItem('shineHistory') || '{}');
    }

    async function saveToCloud() {
        try {
            const res = await fetch(`${WORKER_URL}/api/save`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ historyData: historyData })
            });
            const json = await res.json();
            if (json.success) {
                console.log("✅ Saved to cloud successfully");
            }
        } catch (e) {
            console.log("⚠️ Cloud save failed (saved locally only)");
        }
    }

    // ==================== ORIGINAL FUNCTIONS ====================
    function init() {
        const day = d.getDay();
        let todayModeId = "";
        if (day === 0) todayModeId = 'sunday';
        else if (day === 1 || day === 4) todayModeId = 'mon_thu';
        else if (day === 2) todayModeId = 'tue';
        else if (day === 3) todayModeId = 'wed';
        else if (day === 5) todayModeId = 'friday';
        else if (day === 6) todayModeId = 'saturday';

        const todayBtn = document.getElementById('btn-' + todayModeId);
        if (todayBtn) todayBtn.innerText += " (今)";

        if (historyData[todayStr] !== undefined) isLocked = true;

        renderTasks(todayModeId);
        renderCalendar();
        updateMonthCount();
    }

    function renderTasks(mode) {
        currentMode = mode;
        const listEl = document.getElementById('taskList');
        listEl.innerHTML = "";

        const btns = document.querySelectorAll('.tab-btn');
        btns.forEach(btn => {
            btn.classList.remove('active');
            btn.disabled = isLocked;
            if (btn.id === 'btn-' + mode) btn.classList.add('active');
        });

        const taskData = tasks[mode].list;
        const weightData = tasks[mode].weights;

        taskData.forEach((task, index) => {
            const w = weightData[index] || 0;
            const div = document.createElement('div');
            div.className = 'task-item';
            div.innerHTML = `
                <input type="checkbox" onchange="calc()" ${isLocked ? 'disabled' : ''}>
                <div class="info-pill"><span class="time-range">${task.time}</span></div>
                <span class="task-text">${task.text} <span class="weight-text">(${w}%)</span></span>
            `;
            listEl.appendChild(div);
        });

        const gBtn = document.getElementById('genBtn');
        gBtn.disabled = isLocked;
        gBtn.innerText = isLocked ? "今日報告已完成封存" : "💫 生成今日星光報告";
        calc();
    }

    function calc() {
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const weights = tasks[currentMode].weights;
        let score = 0;
        checkboxes.forEach((b, index) => { if (b.checked) score += (weights[index] || 0); });

        document.getElementById('num').innerText = score + '%';
        const bar = document.getElementById('bar');
        bar.style.width = Math.min(score, 100) + '%';

        const pBox = document.getElementById('pBox');
        if (score >= 100) {
            pBox.className = "progress-box complete"; 
            bar.className = "complete";
            document.getElementById('msg').innerText = "完美達成！今天妳是最耀眼的女孩！💖";
        } else {
            pBox.className = "progress-box"; 
            bar.className = "";
            document.getElementById('msg').innerText = score >= 80 ? "妳正在閃閃發光唷！✨" : "讓星光再亮一點點吧 🌙";
        }
    }

    async function gen() {
        if(confirm("確定生成報告嗎？生成後今日將鎖定。")) {
            const score = parseInt(document.getElementById('num').innerText);
            historyData[todayStr] = score;
            localStorage.setItem('shineHistory', JSON.stringify(historyData));
            isLocked = true;

            await saveToCloud();           // Save to cloud
            renderTasks(currentMode);
            renderCalendar();
            updateMonthCount();
        }
    }

    function parentUnlock() {
        if (prompt("請輸入家長管理密碼：") === PARENT_PIN) {
            isLocked = false;
            renderTasks(currentMode);
            alert("已解除鎖定。");
        }
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = "";
        ['日','一','二','三','四','五','六'].forEach(l => {
            const el = document.createElement('div');
            el.className = 'cal-day-label';
            el.innerText = l;
            grid.appendChild(el);
        });

        const firstDay = new Date(d.getFullYear(), d.getMonth(), 1).getDay();
        const daysInMonth = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();

        for(let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

        for(let day = 1; day <= daysInMonth; day++) {
            const cell = document.createElement('div');
            cell.className = 'cal-cell active';
            const dateKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

            if(dateKey === todayStr) cell.classList.add('today');

            const score = historyData[dateKey];
            let percentHtml = "";

            if(score !== undefined) {
                percentHtml = `<span class="cal-percent">${score}%</span>`;
                if(score >= 100) cell.classList.add('lv-high');
                else if(score >= 80) cell.classList.add('lv-mid');
                else cell.classList.add('lv-low');
            }

            cell.innerHTML = `<span>${day}</span>${percentHtml}`;
            grid.appendChild(cell);
        }
    }

    function updateMonthCount() {
        const currentMonth = d.getMonth() + 1;
        const currentYear = d.getFullYear();
        let count = 0;
        for (const dateKey in historyData) {
            const [year, month] = dateKey.split('-').map(Number);
            if (year === currentYear && month === currentMonth && historyData[dateKey] >= 90) count++;
        }
        document.getElementById('monthCount').innerText = count;
    }

    // Start the app with cloud loading
    async function startApp() {
        await loadFromCloud();
        init();
    }

    startApp();   // ← This replaces the old init()
</script>
