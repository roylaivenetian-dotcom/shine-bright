<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#5c6bc0">
    <title>Shine Bright ✨ 少女星光養成計劃</title>
  
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #5c6bc0;
            --accent: #ffab91;
            --bg: #fffdf9;
            --danger: #e91e63;
            --success: #4caf50;
            --font-cute: 'Ma Shan Zheng', cursive, "Microsoft JhengHei";
        }
      
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: var(--bg); padding: 15px; color: #444; margin: 0; }
      
        .container {
            max-width: 480px; background: white; padding: 25px; border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05); margin: 20px auto; border: 1px solid #f0f0f0;
        }
      
        h2 { text-align: center; color: var(--primary); font-family: var(--font-cute); font-size: 2.2em; margin-bottom: 5px; }
        .date-display { text-align: center; font-size: 1.1em; color: var(--accent); margin-bottom: 20px; font-weight: bold; }
      
        .admin-controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-bottom: 25px; background: #f9f9f9; padding: 10px; border-radius: 20px; }
        .tab-btn { padding: 6px 10px; font-size: 0.75em; border: none; border-radius: 12px; cursor: pointer; background: white; color: #999; transition: 0.3s; font-family: var(--font-cute); }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(92, 107, 192, 0.3); }
        
        .task-item { display: flex; align-items: flex-start; padding: 12px 5px; border-bottom: 1px dashed #eee; }
        .task-item input { width: 24px; height: 24px; margin-right: 15px; margin-top: 2px; accent-color: var(--accent); }
        .task-item input:disabled { cursor: not-allowed; opacity: 0.6; }
      
        .info-pill { min-width: 105px; margin-right: 12px; }
        .time-range { background: #e8eaf6; color: var(--primary); padding: 3px 6px; border-radius: 8px; font-size: 0.8em; font-weight: bold; display: block; text-align: center; }
        .task-text { font-size: 1em; line-height: 1.4; flex-grow: 1; }
        .weight-text { color: #aaa; font-size: 0.85em; margin-left: 5px; }
        .red-task { color: var(--danger); font-weight: bold; }
        .family-task { color: #5d4037; font-weight: bold; }
      
        .progress-box { margin-top: 25px; text-align: center; padding: 20px; background: #fdf2f2; border-radius: 20px; }
        .progress-box.complete { background: #e8f5e9; }
        .bar-bg { background: #eee; border-radius: 50px; height: 14px; margin: 15px 0; overflow: hidden; }
        #bar { background: linear-gradient(90deg, #5c6bc0, #8e99f3); height: 100%; width: 0%; transition: 0.8s ease; }
        #bar.complete { background: linear-gradient(90deg, #4caf50, #8bc34a); }
        #msg { font-family: var(--font-cute); font-size: 1.2em; color: var(--primary); }
      
        .action-btn { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 20px; font-size: 1.3em; margin-top: 20px; cursor: pointer; font-family: var(--font-cute); }
        .parent-unlock { text-align: right; margin-top: 10px; font-size: 0.8em; color: #bbb; text-decoration: underline; cursor: pointer; }
        .calendar-section { margin-top: 30px; border-top: 2px solid #f0f0f0; padding-top: 20px; }
        .calendar-title { font-family: var(--font-cute); font-size: 1.5em; color: var(--primary); text-align: center; margin-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
        .cal-day-label { font-size: 0.7em; color: #999; font-weight: bold; padding-bottom: 5px; }
      
        .cal-cell {
            aspect-ratio: 1; border-radius: 12px; background: #f9f9f9; font-size: 0.75em;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #ccc; border: 2px solid transparent;
        }
        .cal-cell.active { color: #444; background: #fff; border: 1px solid #eee; }
        .cal-cell .cal-percent { font-size: 0.7em; margin-top: 2px; font-weight: bold; }
        .cal-cell.lv-high { background: #c8e6c9 !important; color: #2e7d32; }
        .cal-cell.lv-mid { background: #fff9c4 !important; color: #f57f17; }
        .cal-cell.lv-low { background: #f5f5f5 !important; color: #d32f2f; border: 2px solid var(--danger) !important; }
        .cal-cell.today { background: #e8eaf6; border: 2px solid var(--primary) !important; font-weight: bold; }
      
        .award-note { margin-top: 15px; padding: 15px; background: #fffde7; border-radius: 20px; font-size: 0.9em; color: #795548; line-height: 1.5; border: 2px dashed #fff59d; text-align: center; }
        .counter-box { display: inline-block; background: white; padding: 5px 15px; border-radius: 10px; margin-top: 8px; border: 1px solid #eee; }
        .counter-num { color: var(--primary); font-size: 1.2em; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h2>Shine Bright ✨</h2>
    <div class="date-display" id="dateText"></div>
    
    <div class="admin-controls">
        <button class="tab-btn" id="btn-mon_thu" onclick="renderTasks('mon_thu')">週一/四</button>
        <button class="tab-btn" id="btn-tue" onclick="renderTasks('tue')">週二</button>
        <button class="tab-btn" id="btn-wed" onclick="renderTasks('wed')">週三(數研)</button>
        <button class="tab-btn" id="btn-friday" onclick="renderTasks('friday')">週五</button>
        <button class="tab-btn" id="btn-saturday" onclick="renderTasks('saturday')">週六</button>
        <button class="tab-btn" id="btn-sunday" onclick="renderTasks('sunday')">週日</button>
    </div>

    <div id="taskList"></div>
    <div class="parent-unlock" onclick="parentUnlock()">家長管理權限</div>

    <div class="progress-box" id="pBox">
        <b>今日星光達成率：<span id="num">0%</span></b>
        <div class="bar-bg"><div id="bar"></div></div>
        <div id="msg">讓星光再亮一點點吧 🌙</div>
    </div>

    <button class="action-btn" id="genBtn" onclick="gen()">💫 生成今日星光報告</button>

    <div class="calendar-section">
        <div class="calendar-title">星光成就日曆 📅</div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <div class="award-note">
            <span class="award-main">🎁 獎勵小叮嚀：若每月有 90% 以上日子達標，將獲得 HKD $200 獎勵！</span>
            <div class="counter-box">本月已達標：<span class="counter-num" id="monthCount">0</span> 天</div>
        </div>
    </div>
</div>

<script>
    const PARENT_PIN = "8888";
    const WORKER_URL = "https://shine-bright-api.roy-lai-venetian.workers.dev";

    const tasks = {
        mon_thu: { weights: [20, 30, 20, 15, 15], list: [
            { time: "05:00 - 06:15", text: "準時起床 + 晨間高效溫習" },
            { time: "17:30 - 19:00", text: "<b>第一階段：</b>全力完成作業" },
            { time: "20:15 - 21:00", text: "<b>第二階段：</b>溫習與預習" },
            { time: "21:30 熄燈", text: "放下手機，準時入睡" },
            { time: "常規", text: "<span class='family-task'>對家人保持禮貌與情緒自控</span>" }
        ]},
        tue: { weights: [25, 30, 15, 15, 15], list: [
            { time: "05:00 - 06:15", text: "準時起床 + 晨間高效溫習" },
            { time: "18:00 - 19:00", text: "<b>回家功課：</b>集中精神完成" },
            { time: "20:00 - 20:30", text: "<b>檢查功課及整理書包</b>" },
            { time: "21:30 熄燈", text: "準時入睡" },
            { time: "常規", text: "<span class='family-task'>對家人保持禮貌與情緒自控</span>" }
        ]},
        wed: { weights: [20, 30, 20, 15, 15], list: [
            { time: "05:00 - 06:15", text: "準時起床 + 晨間高效溫習" },
            { time: "17:40 - 19:00", text: "<b>數研班：</b>專注邏輯訓練" },
            { time: "20:00 - 21:00", text: "<b>高效功課：</b>精簡時間完成作業" },
            { time: "21:30 熄燈", text: "準時入睡" },
            { time: "常規", text: "<span class='family-task'>對家人保持禮貌與情緒自控</span>" }
        ]},
        friday: { weights: [20, 25, 25, 15, 15], list: [
            { time: "05:00 - 06:15", text: "晨間高效溫習" },
            { time: "16:30 - 18:00", text: "<span class='red-task'>關鍵：完成至少 1/3 週末功課</span>" },
            { time: "20:15 - 21:00", text: "<span class='red-task'>重點：溫習最少半課書</span>" },
            { time: "22:30 熄燈", text: "週末彈性入睡時間" },
            { time: "常規", text: "<span class='family-task'>對家人保持禮貌與情緒自控</span>" }
        ]},
        saturday: { weights: [20, 20, 20, 20, 20], list: [
            { time: "09:00 - 10:30", text: "<b>日文班</b>" },
            { time: "11:30 - 12:30", text: "<span class='red-task'>核心：清空所有剩餘功課</span>" },
            { time: "14:00 - 15:30", text: "<span class='red-task'>專注：溫習最少半課書 (或補習)</span>" },
            { time: "18:00 - 19:00", text: "<b>羽毛球班</b>" },
            { time: "常規", text: "<span class='family-task'>對家人保持禮貌與情緒自控</span>" }
        ]},
        sunday: { weights: [20, 30, 20, 15, 15], list: [
            { time: "09:00 - 10:00", text: "<b>準時起床 + 早餐</b>" },
            { time: "10:30 - 12:00", text: "<span class='red-task'>專注：溫習最少半課書 (或補習)</span>" },
            { time: "16:30 - 17:30", text: "<b>檢查書包、功課與校服</b>" },
            { time: "21:30 熄燈", text: "準時入睡" },
            { time: "常規", text: "<span class='family-task'>對家人保持禮貌與情緒自控</span>" }
        ]}
    };

    let currentMode = "";
    let historyData = {};

    // Get fresh Hong Kong date
    function getHKToday() {
        const now = new Date();
        const hkDate = new Date(now.toLocaleString("en-US", { timeZone: "Asia/Hong_Kong" }));
        const todayStr = hkDate.toISOString().split('T')[0];
        return { hkDate, todayStr };
    }

    // Cloud functions
    async function loadFromCloud() {
        try {
            const res = await fetch(`${WORKER_URL}/api/load`);
            if (res.ok) {
                const json = await res.json();
                if (json.success && json.historyData) {
                    historyData = json.historyData;
                }
            }
        } catch (e) {}
        if (Object.keys(historyData).length === 0) {
            historyData = JSON.parse(localStorage.getItem('shineHistory') || '{}');
        }
    }

    async function saveToCloud() {
        try {
            await fetch(`${WORKER_URL}/api/save`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ historyData: historyData })
            });
        } catch (e) {}
    }

    function init() {
        const { hkDate, todayStr } = getHKToday();
        const day = hkDate.getDay();   // 0 = Sunday

        let mode = 'sunday';
        if (day === 1 || day === 4) mode = 'mon_thu';
        else if (day === 2) mode = 'tue';
        else if (day === 3) mode = 'wed';
        else if (day === 5) mode = 'friday';
        else if (day === 6) mode = 'saturday';

        // Mark today's tab
        const todayBtn = document.getElementById('btn-' + mode);
        if (todayBtn) todayBtn.innerText = todayBtn.innerText.replace(" (今)", "") + " (今)";

        document.getElementById('dateText').innerText = 
            hkDate.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });

        const isLocked = (historyData[todayStr] !== undefined);

        renderTasks(mode, isLocked, todayStr);
        renderCalendar(hkDate, todayStr);
        updateMonthCount(hkDate);
    }

    function renderTasks(mode, isLocked, todayStr) {
        currentMode = mode;
        const listEl = document.getElementById('taskList');
        listEl.innerHTML = "";

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.id === 'btn-' + mode);
            btn.disabled = isLocked;
        });

        const data = tasks[mode];
        data.list.forEach((task, i) => {
            const weight = data.weights[i];
            const div = document.createElement('div');
            div.className = 'task-item';
            div.innerHTML = `
                <input type="checkbox" onchange="calc()" ${isLocked ? 'disabled' : ''}>
                <div class="info-pill"><span class="time-range">${task.time}</span></div>
                <span class="task-text">${task.text} <span class="weight-text">(${weight}%)</span></span>
            `;
            listEl.appendChild(div);
        });

        const btn = document.getElementById('genBtn');
        if (isLocked) {
            btn.disabled = true;
            btn.innerText = "✅ 今日報告已封存";
        } else {
            btn.disabled = false;
            btn.innerText = "💫 生成今日星光報告";
        }

        calc();
    }

    function calc() {
        if (!currentMode) return;
        const checkboxes = document.querySelectorAll('#taskList input[type="checkbox"]');
        const weights = tasks[currentMode].weights;
        let score = 0;
        checkboxes.forEach((cb, i) => { if (cb.checked) score += weights[i] || 0; });

        document.getElementById('num').innerText = score + '%';
        const bar = document.getElementById('bar');
        bar.style.width = Math.min(score, 100) + '%';

        const pBox = document.getElementById('pBox');
        if (score >= 100) {
            pBox.classList.add('complete');
            bar.classList.add('complete');
            document.getElementById('msg').innerText = "完美達成！今天妳是最耀眼的女孩！💖";
        } else {
            pBox.classList.remove('complete');
            bar.classList.remove('complete');
            document.getElementById('msg').innerText = score >= 80 ? "妳正在閃閃發光唷！✨" : "讓星光再亮一點點吧 🌙";
        }
    }

    async function gen() {
        if (!confirm("確定生成報告嗎？生成後今日將鎖定。")) return;
        const { todayStr } = getHKToday();
        const score = parseInt(document.getElementById('num').innerText);
        historyData[todayStr] = score;
        localStorage.setItem('shineHistory', JSON.stringify(historyData));
        await saveToCloud();

        init();   // Refresh everything
    }

    function parentUnlock() {
        if (prompt("請輸入家長管理密碼：") === PARENT_PIN) {
            const { todayStr } = getHKToday();
            delete historyData[todayStr];   // Allow reset
            localStorage.setItem('shineHistory', JSON.stringify(historyData));
            init();
            alert("已解除鎖定，可以重新勾選。");
        }
    }

    function renderCalendar(hkDate, todayStr) {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = "";
        ['日','一','二','三','四','五','六'].forEach(l => {
            const el = document.createElement('div');
            el.className = 'cal-day-label';
            el.innerText = l;
            grid.appendChild(el);
        });

        const firstDay = new Date(hkDate.getFullYear(), hkDate.getMonth(), 1).getDay();
        const daysInMonth = new Date(hkDate.getFullYear(), hkDate.getMonth() + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

        for (let day = 1; day <= daysInMonth; day++) {
            const cell = document.createElement('div');
            cell.className = 'cal-cell active';
            const dateKey = `${hkDate.getFullYear()}-${String(hkDate.getMonth()+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            
            if (dateKey === todayStr) cell.classList.add('today');

            const score = historyData[dateKey];
            if (score !== undefined) {
                const percentHtml = `<span class="cal-percent">${score}%</span>`;
                cell.innerHTML = `<span>${day}</span>${percentHtml}`;
                if (score >= 100) cell.classList.add('lv-high');
                else if (score >= 80) cell.classList.add('lv-mid');
                else cell.classList.add('lv-low');
            } else {
                cell.innerHTML = `<span>${day}</span>`;
            }
            grid.appendChild(cell);
        }
    }

    function updateMonthCount(hkDate) {
        const year = hkDate.getFullYear();
        const month = hkDate.getMonth() + 1;
        let count = 0;
        for (const key in historyData) {
            const [y, m] = key.split('-').map(Number);
            if (y === year && m === month && historyData[key] >= 90) count++;
        }
        document.getElementById('monthCount').innerText = count;
    }

    // Start
    async function startApp() {
        await loadFromCloud();
        init();
    }

    startApp();
</script>
</body>
</html>
